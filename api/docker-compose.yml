services:
  postgrest:
    image: postgrest/postgrest:latest
    container_name: artemis-postgrest
    environment:
      - PGRST_DB_URI
      - PGRST_DB_SCHEMAS=public
      - PGRST_DB_ANON_ROLE=web_anon
      - PGRST_SERVER_PORT=3000
      - PGRST_OPENAPI_SERVER_PROXY_URI=https://poc.fsdh-dhsf.science.cloud-nuage.canada.ca/app/NASAJPL/api
      - PGRST_SERVER_CORS_ALLOWED_ORIGINS=*
    restart: unless-stopped

  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: artemis-postgrest-swagger
    environment:
      - API_URL=https://poc.fsdh-dhsf.science.cloud-nuage.canada.ca/app/NASAJPL/api
    depends_on:
      - postgrest
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: artemis-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - swagger
      - postgrest
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
          listen 8080;

          location / {
            proxy_pass http://swagger:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
          }

          location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://postgrest:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
          }
        }
        NGINX

        nginx -g 'daemon off;'
    restart: unless-stopped