services:
  postgrest:
    image: postgrest/postgrest:latest
    container_name: artemis-postgrest
    environment:
      PGRST_DB_SCHEMAS: "public"
      PGRST_DB_ANON_ROLE: "web_anon"
      PGRST_SERVER_HOST: "0.0.0.0"
      PGRST_SERVER_PORT: "5050"
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: "*"
    restart: unless-stopped

  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: artemis-postgrest-swagger
    environment:
      # No BASE_URL. Swagger serves normally.
      API_URL: "/app/NASAJPL/api/"
    depends_on:
      - postgrest
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: artemis-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - swagger
      - postgrest
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
          listen 8080;

          location / {
            proxy_pass http://swagger:8080/;
          }

          location /api/ {
            proxy_pass http://postgrest:5050/;
          }
        }
        NGINX

        nginx -g 'daemon off;'
    restart: unless-stopped